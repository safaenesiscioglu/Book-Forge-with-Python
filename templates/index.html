<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #161412;
      --surface2: #1e1b18;
      --border: #2a2520;
      --accent: #c8a96e;
      --accent2: #8b6f42;
      --text: #e8e0d4;
      --muted: #7a6f62;
      --dim: #4a4238;
      --ok: #6b9e78;
      --err: #c47070;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <svg class="logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="3" width="24" height="34" rx="1" stroke="#c8a96e" stroke-width="1.4" />
        <rect x="10" y="3" width="24" height="34" rx="1" stroke="#8b6f42" stroke-width="1.4" fill="#161412" />
        <line x1="16" y1="12" x2="28" y2="12" stroke="#c8a96e" stroke-width=".9" stroke-opacity=".6" />
        <line x1="16" y1="17" x2="28" y2="17" stroke="#c8a96e" stroke-width=".9" stroke-opacity=".4" />
        <line x1="16" y1="22" x2="24" y2="22" stroke="#c8a96e" stroke-width=".9" stroke-opacity=".3" />
      </svg>
      <h1>Book<em>Forge</em></h1>
      <p class="tagline">PDF → A5 Dönüştürücü · Saf Python</p>
      <div class="rule"></div>
    </header>

    <div class="card" id="upload-card">
      <div class="drop" id="drop" onclick="document.getElementById('file-input').click()">
        <span class="drop-icon">📄</span>
        <p class="drop-main">PDF dosyasını buraya sürükle</p>
        <p class="drop-sub">veya tıkla · Maks 200 MB</p>
      </div>
      <input type="file" id="file-input" accept=".pdf">
      <div class="file-badge" id="file-badge">
        <span style="font-size:1.3rem">📕</span>
        <span class="file-badge-name" id="fname"></span>
        <span class="file-badge-size" id="fsize"></span>
      </div>

      <div class="field">
        <label>Kitap Adı <span style="color:var(--dim)">(opsiyonel)</span></label>
        <input type="text" id="title-input" placeholder="Boş bırakırsan dosya adından alınır">
      </div>

      <!-- MOD SEÇİCİ -->
      <div
        style="margin-top:20px;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">
        Dönüşüm Modu</div>
      <div class="mode-grid">
        <label class="mode-card selected" onclick="setMode('preserve')">
          <input type="radio" name="mode" value="preserve" checked>
          <span class="mode-badge badge-new">Önerilen</span>
          <div class="mode-title">🎨 Orijinal Görünüm</div>
          <div class="mode-desc">Kapak, resimler ve sayfa stili korunur. OCR ile metin aranabilir olur. A5 boyutuna
            küçültülür.</div>
        </label>
        <label class="mode-card" onclick="setMode('reflow')">
          <input type="radio" name="mode" value="reflow">
          <span class="mode-badge badge-adv">Gelişmiş</span>
          <div class="mode-title">📖 Roman Stili</div>
          <div class="mode-desc">Metin yeniden düzenlenir. EPUB ve temiz roman formatı PDF oluşturulur.</div>
        </label>
      </div>

      <!-- Reflow seçenekleri -->
      <div class="reflow-opts" id="reflow-opts">
        <div class="opts" style="margin-top:16px">
          <div class="opt">
            <label>Dil</label>
            <select id="lang">
              <option value="tur+eng">Türkçe + English</option>
              <option value="tur">Sadece Türkçe</option>
              <option value="eng">Sadece English</option>
            </select>
          </div>
          <div class="opt">
            <label>Çıktı</label>
            <select id="fmt">
              <option value="both">EPUB + A5 PDF</option>
              <option value="epub">Sadece EPUB</option>
              <option value="pdf">Sadece A5 PDF</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Preserve dil seçimi -->
      <div id="preserve-lang" style="margin-top:16px">
        <div class="opt">
          <label>OCR Dili</label>
          <select id="lang-preserve">
            <option value="tur+eng">Türkçe + English</option>
            <option value="tur">Sadece Türkçe</option>
            <option value="eng">Sadece English</option>
          </select>
        </div>
      </div>

      <button class="btn" id="btn" onclick="go()" disabled>Dönüştür →</button>
    </div>

    <div class="card" id="prog">
      <div class="prog-head">
        <span class="prog-title">İşleniyor…</span>
        <div class="spin" id="spin"></div>
      </div>
      <div class="logbox" id="logbox"></div>
    </div>

    <div class="card" id="result">
      <div id="result-inner"></div>
      <button class="btn-reset" onclick="reset()">← Yeni dosya</button>
    </div>

    <footer>BookForge · pymupdf + pytesseract + ebooklib + reportlab · <a href="https://github.com"
        target="_blank">GitHub →</a></footer>
  </div>

  <script>
    let file = null, currentMode = 'preserve', poll = null;

    const drop = document.getElementById('drop');
    const fi = document.getElementById('file-input');
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over') });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); const f = e.dataTransfer.files[0]; if (f?.name.toLowerCase().endsWith('.pdf')) setFile(f) });
    fi.addEventListener('change', () => fi.files[0] && setFile(fi.files[0]));

    function setFile(f) {
      file = f;
      document.getElementById('fname').textContent = f.name;
      document.getElementById('fsize').textContent = fmt(f.size);
      document.getElementById('file-badge').classList.add('show');
      document.getElementById('btn').disabled = false;
    }
    function fmt(b) { return b < 1048576 ? (b / 1024).toFixed(0) + ' KB' : (b / 1048576).toFixed(1) + ' MB' }

    function setMode(m) {
      currentMode = m;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('reflow-opts').classList.toggle('show', m === 'reflow');
      document.getElementById('preserve-lang').style.display = m === 'preserve' ? 'block' : 'none';
    }

    async function go() {
      if (!file) return;
      const title = document.getElementById('title-input').value.trim();
      const fd = new FormData();
      fd.append('file', file);
      fd.append('mode', currentMode);
      fd.append('title', title);
      if (currentMode === 'preserve') {
        fd.append('lang', document.getElementById('lang-preserve').value);
      } else {
        const fmtVal = document.getElementById('fmt').value;
        fd.append('lang', document.getElementById('lang').value);
        fd.append('epub', (fmtVal === 'both' || fmtVal === 'epub') ? 'true' : 'false');
        fd.append('pdf', (fmtVal === 'both' || fmtVal === 'pdf') ? 'true' : 'false');
      }
      document.getElementById('upload-card').style.cssText = 'opacity:.35;pointer-events:none';
      document.getElementById('prog').classList.add('show');
      document.getElementById('logbox').innerHTML = '';
      try {
        const res = await fetch('/convert', { method: 'POST', body: fd });
        const d = await res.json();
        if (d.error) { showErr(d.error); return }
        startPoll(d.job_id);
      } catch (e) { showErr('Bağlantı hatası: ' + e.message) }
    }

    function startPoll(id) {
      let last = 0;
      poll = setInterval(async () => {
        try {
          const d = await (await fetch(`/status/${id}`)).json();
          const box = document.getElementById('logbox');
          (d.log || []).slice(last).forEach(line => {
            const el = document.createElement('div');
            el.className = 'log-line'; el.textContent = line;
            box.appendChild(el); box.scrollTop = box.scrollHeight;
          });
          last = (d.log || []).length;
          if (d.status === 'done') { clearInterval(poll); document.getElementById('spin').style.display = 'none'; showDone(d.outputs, id) }
          else if (d.status === 'error') { clearInterval(poll); showErr(d.error || 'Bilinmeyen hata') }
        } catch (_) { }
      }, 1000);
    }

    function showDone(outputs, id) {
      document.getElementById('result').classList.add('show');
      document.getElementById('result-inner').innerHTML = `
    <div class="res-title">✦ Tamamlandı</div>
    <div class="res-sub">${outputs.length} dosya hazır</div>
    <div class="dl-list">${outputs.map(o => `
      <a class="dl-btn" href="/download/${id}/${o.name}" download="${o.name}">
        <span class="badge b-${o.type}">${o.type.toUpperCase()}</span>
        <span class="dl-name">${o.name}</span>
        <span style="color:var(--dim)">↓</span>
      </a>`).join('')}</div>`;
    }

    function showErr(msg) {
      document.getElementById('result').classList.add('show');
      document.getElementById('result-inner').innerHTML = `
    <div class="res-title" style="color:var(--err)">Hata</div>
    <div class="err-box">${msg}</div>`;
    }

    function reset() {
      if (poll) clearInterval(poll);
      file = null;
      document.getElementById('upload-card').style.cssText = '';
      document.getElementById('prog').classList.remove('show');
      document.getElementById('result').classList.remove('show');
      document.getElementById('file-badge').classList.remove('show');
      document.getElementById('btn').disabled = true;
      document.getElementById('spin').style.display = 'block';
      document.getElementById('logbox').innerHTML = '';
      fi.value = '';
    }
  </script>
</body>

</html>
